<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dietalife | محاسبه پیشرفته BMI</title>
    <link rel="stylesheet" href="Css/bmi.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <img src="image/logo.png" alt="لوگو رژیم آنلاین" class="logo">
            <span class="brand-name">Dietalife</span>
        </div>
        
        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">صفحه اصلی</a></li>
                <li><a href="bmi.html" class="active">محاسبه BMI</a></li>
                <li><a href="#" >تولید رژیم و ارزیابی</a></li>
                <li><a href="#">دانشنامه پزشکی</a></li>
                <li><a href="#">فوریت های پزشکی</a></li>
            </ul>
        </nav>
        <div class="header-spacer"></div>
    </header>

    <section class="bmi-page-section">
        <div class="bmi-two-column-wrapper">
            
            <div class="bmi-page-container">
                <div class="bmi-header-badge">هوشمند و دقیق</div>
                <h2>آنالیز شاخص توده بدنی (BMI)</h2>
                <p class="subtitle">مشخصات آنتروپومتریک خود را وارد کنید تا پروفایل سلامت شما ارزیابی شود.</p>
                
                <div class="bmi-form">
                    <div class="gender-selection">
                        <label class="gender-box active" data-gender="male">
                            <img src="image/man.png" alt="آقا" class="gender-custom-icon">
                            <span>آقا</span>
                        </label>
                        <label class="gender-box" data-gender="female">
                            <img src="image/woman.png" alt="خانم" class="gender-custom-icon">
                            <span>خانم</span>
                        </label>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="page-weight">وزن (کیلوگرم)</label>
                            <input type="number" id="page-weight" placeholder="مثلا 75" min="20" max="300">
                        </div>
                        <div class="form-group">
                            <label for="page-height">قد (سانتی‌متر)</label>
                            <input type="number" id="page-height" placeholder="مثلا 175" min="50" max="250">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="page-age">سن (سال)</label>
                        <input type="number" id="page-age" placeholder="مثلا 26" min="1" max="120">
                    </div>
                    
                    <button id="btn-page-calculate" class="btn-green-glow">محاسبه و ارزیابی هوشمند</button>
                </div>
            </div>

            <div id="page-bmi-result" class="page-result-box" style="display: none;">
                <div class="result-header">
                    <h3>گزارش تحلیلی Dietalife</h3>
                    <div id="bmi-badge-status" class="status-badge"></div>
                </div>
                
                <div class="bmi-circle" id="bmi-circle-main">
                    <span id="page-bmi-value">0</span>
                    <small>شاخص BMI</small>
                </div>

                <div class="result-metrics-text">
                    <p><strong>وضعیت بدنی:</strong> <span id="page-bmi-status"></span></p>
                    <p id="page-bmi-advice" class="result-advice"></p>
                </div>

                <div class="result-actions">
                    <a href="index.html" class="btn-green-glow" style="text-decoration: none; display: block; text-align: center;">بازگشت به خانه</a>
                </div>
            </div>

        </div>
    </section>

    <script src="Js/script.js"></script>
</body>
</html>
